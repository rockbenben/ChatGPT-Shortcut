name: 🐳 Build Offline Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: chatgpt-shortcut

jobs:
  check_branch:
    name: Verify branch
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/offline'
    steps:
      - name: ❌ Wrong branch
        run: |
          echo "::error::This workflow must be triggered from the 'offline' branch. Current: ${{ github.ref }}"
          exit 1

  push_offline_image:
    name: Build and push offline Docker image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/offline'
    steps:
      - name: 🚚 Check out the repo
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase GitHub Owner
        run: |
          echo "GH_OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: 📦 Read package.json version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Read version: ${VERSION}"

      - name: 🏷️ Generate Docker tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.GH_OWNER_LC }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=offline
            type=raw,value=${{ steps.pkg.outputs.version }}-offline,enable=${{ steps.pkg.outputs.version != '' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
