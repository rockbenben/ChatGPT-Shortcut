name: 🐳 Build and Push Docker Image

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: chatgpt-shortcut

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub and GHCR
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Check out the repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # showLastUpdateTime 需要完整 git 历史读取文档最后更新时间

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase GitHub Owner
        run: |
          echo "GH_OWNER_LC=${OWNER,,}" >>${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: 📦 Read package.json version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Read version: ${VERSION}"

      - name: 🏷️ Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ env.GH_OWNER_LC }}/${{ env.IMAGE_NAME }}
          # value= 让 semver tag 取 package.json 版本号而非 git tag，
          # 这样手动触发（workflow_dispatch，无 tag）也能得到版本号 + latest
          tags: |
            type=semver,pattern={{version}},value=${{ steps.pkg.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.pkg.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.pkg.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
